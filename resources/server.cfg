# --- Utilities ---
ensure sb_progressbar                       # Shared progress bar (used by future scripts)
ensure sb_doorlock                          # Door lock system (job-based access)

# --- Gameplay Systems ---
ensure sb_inventory                         # Drag-and-drop inventory + hotbar
ensure sb_metabolism                        # Hunger & thirst decay + effects
ensure sb_deaths                            # Death screen, respawn, emergency call

# --- Economy ---
ensure sb_banking                           # Bank accounts, ATM, transactions

# --- Commerce ---
