ensure sb_rental                            # Vehicle rental (bikes, scooters, cars)
ensure sb_impound                           # Vehicle impound, disconnect persistence
#ensure sb_mechanic                         # Benny's elevator, mechanic system (v1 - disabled for v2)
ensure sb_mma                               # MMA arena betting (scheduled fights)

