# ============================================================================
#                          SB FRAMEWORK RP SERVER
#                              server.cfg
# ============================================================================

# ============================================================================
# SERVER IDENTITY
# ============================================================================
sv_hostname "SB Framework RP | Custom Framework"
sets sv_projectName "SB Framework Roleplay"
sets sv_projectDesc "Custom-built FiveM RP framework from scratch"
sets tags "roleplay, custom, rp, serious, economy, jobs, gangs"
sets locale "en-US"

# ============================================================================
# SERVER CONFIGURATION
# ============================================================================
sv_enforceGameBuild 3258                    # mp2024_01 - Bottom Dollar Bounties

# Password is handled by sb_whitelist (adaptive card system)
# sv_password is NOT used - whitelisted players bypass password entirely

# Enable fly through windscreen (required for seatbelt ejection)
setr game_enableFlyThroughWindscreen true
sv_licenseKey "your_license_key_here"
sv_maxclients 64
load_server_icon logo.png                   # Must be actual PNG format, 96x96
endpoint_add_tcp "0.0.0.0:30120"
endpoint_add_udp "0.0.0.0:30120"
set steam_webApiKey "your_steam_api_key_here"
set resources_useSystemChat true

# OneSync - configured via txAdmin settings page
# Do not set onesync here

# ============================================================================
# DATABASE CONFIGURATION
# ============================================================================
set mysql_connection_string "mysql://root:password@localhost/sb_framework?charset=utf8mb4"
set mysql_debug false

# ============================================================================
# SB_PHONE CONFIGURATION
# ============================================================================
set sb_phone_fivemanager_token "your_fivemanager_token_here"
set sb_phone_devmode "false"

# ============================================================================
# STANDALONE RESOURCES (Dependencies)
# ============================================================================
ensure oxmysql
ensure screenshot-basic
ensure bob74_ipl                            # GTA Online MC Business interiors (for sb_drugs labs)

# ============================================================================
# WHITELIST (must load after oxmysql, before everything else)
# ============================================================================
ensure sb_whitelist

# ============================================================================
# PMA-VOICE Configuration
# ============================================================================
setr voice_useNativeAudio 1
setr voice_use2dAudio 0
setr voice_use3dAudio 0
setr voice_useSendingRangeOnly 1
setr voice_enableUi 0
setr voice_enableProximityCycle 1
setr voice_defaultCycle "F11"
setr voice_defaultVoiceMode 2
setr voice_enableRadios 1
setr voice_enableCalls 1
setr voice_enableSubmix 1
setr voice_enableRadioAnim 1
setr voice_defaultRadio "LMENU"
setr voice_defaultRadioVolume 30
setr voice_defaultCallVolume 60
setr voice_refreshRate 200
setr voice_debugMode 0
setr voice_syncData 1
setr voice_hideEndpoints 1
ensure pma-voice

# ============================================================================
# SYSTEM RESOURCES (Core FiveM)
# ============================================================================
ensure mapmanager
# ensure chat
ensure spawnmanager
ensure sessionmanager
ensure hardcap

# ============================================================================
# [CUSTOM] SCRIPTS - sb_* (Load order matters!)
# ============================================================================

# --- Foundation ---
ensure sb_loadingscreen                     # Loading screen with server branding
ensure sb_core                              # Core framework (MUST load first)

# --- Character & UI ---
ensure sb_multicharacter                    # Character selection & creation
ensure sb_notify                            # Toast notification system
ensure sb_minimap                           # Colored minimap textures (stream-only)
ensure sb_hud                               # Arc HUD (health, armor, hunger, thirst, money)

# --- Communication ---
ensure sb_chat                              # Custom chat system (commands, proximity)

# --- Interaction & World ---
