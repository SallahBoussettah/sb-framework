<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SB Progress Bar</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="sb-progress-wrapper" id="progress-wrapper">
        <div class="sb-progress-info">
            <div class="sb-progress-label">
                <i id="progress-icon"></i>
                <span id="progress-text">PROCESSING...</span>
            </div>
            <div class="sb-progress-percentage" id="progress-val">0%</div>
        </div>
        <div class="sb-progress-container">
            <div class="sb-progress-bar" id="progress-bar"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
