<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>24/7 Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="shop-container" class="hidden">
        <!-- Left Sidebar: Categories -->
        <div class="shop-sidebar">
            <div class="shop-logo">
                <i class="fas fa-store"></i>
                <span id="shop-name">24/7 Store</span>
            </div>
            <div class="category-list" id="category-list"></div>
            <div class="shop-balance">
                <div class="balance-row">
                    <i class="fas fa-wallet"></i>
                    <span>Cash: $<span id="balance-cash">0</span></span>
                </div>
                <div class="balance-row">
                    <i class="fas fa-building-columns"></i>
                    <span>Bank: $<span id="balance-bank">0</span></span>
                </div>
            </div>
        </div>

        <!-- Center: Item Grid -->
        <div class="shop-items">
            <div class="items-header">
                <h2 id="category-title">Food</h2>
                <span class="item-count" id="item-count">0 items</span>
            </div>
            <div class="items-grid" id="items-grid"></div>
        </div>

        <!-- Right Panel: Cart -->
        <div class="shop-cart">
            <div class="cart-header">
                <i class="fas fa-cart-shopping"></i>
                <span>Cart</span>
                <span class="cart-count" id="cart-count">0</span>
                <button class="close-btn" id="close-btn">
                    <i class="fas fa-xmark"></i>
                </button>
            </div>
            <div class="cart-items" id="cart-items">
                <div class="cart-empty">
                    <i class="fas fa-basket-shopping"></i>
                    <p>Your cart is empty</p>
                </div>
            </div>
            <div class="cart-footer">
                <div class="cart-total">
                    <span>Total</span>
                    <span id="cart-total">$0</span>
                </div>
                <button class="checkout-btn" id="checkout-btn" disabled>
                    <i class="fas fa-credit-card"></i>
                    Checkout
                </button>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
