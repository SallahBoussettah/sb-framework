<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SB Garage</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="garage-container" class="hidden">
        <div class="garage-panel">
            <!-- Header -->
            <div class="header">
                <div class="header-title">
                    <i data-lucide="warehouse"></i>
                    <div>
                        <span class="header-subtitle">Parking & Storage</span>
                        <h1 id="garage-name">Garage</h1>
                    </div>
                </div>
            </div>

            <!-- Tabs -->
            <div class="tabs">
                <div class="tab active" data-tab="this-garage">This Garage</div>
                <div class="tab" data-tab="all-vehicles">Global Fleet</div>
            </div>

            <!-- Stats -->
            <div class="garage-stats">
                <span id="garage-stats">Stored: <b>0/10</b></span>
                <span id="total-stats">Total Stored: <b>0</b></span>
            </div>

            <!-- Vehicle List -->
            <div class="vehicle-list" id="vehicle-list">
                <!-- Vehicle cards populated by JS -->
            </div>

            <!-- Empty State -->
            <div class="empty-state hidden" id="empty-state">
                <i data-lucide="car" class="empty-icon"></i>
                <h3>No Vehicles Stored</h3>
                <p>Drive a vehicle here and talk to the attendant to store it.</p>
            </div>

            <!-- Footer Balance -->
            <div class="footer-balance">
                <div class="balance-item">
                    <i data-lucide="banknote"></i>
                    <div>
                        <span>Cash</span>
                        <div id="cash-display">$0</div>
                    </div>
                </div>
                <div class="balance-item">
                    <i data-lucide="landmark"></i>
                    <div>
                        <span>Bank</span>
                        <div id="bank-display">$0</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Exit Hint -->
        <div class="exit-hint">
            Press <span class="keycap">ESC</span> to close garage
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
